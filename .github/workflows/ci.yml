name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.26.3"
jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...
      - run: go test ./... -count=1 -race -timeout 300s
      - run: go build ./...

  verify-self:
    # Dogfood: report what prism verify finds on this PR's own diff.
    # Non-blocking — accumulates the real-world completeness signal on our
    # own commits without gating.
    name: verify (self, reporting)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: build prism (pinned dep)
        run: go build -o /tmp/prism github.com/provasign/prism/cmd/prism
      - name: verify diff vs base
        continue-on-error: true
        run: |
          /tmp/prism index . >/dev/null 2>&1 || true
          echo "## prism verify — this PR's diff vs ${{ github.base_ref }}" >> "$GITHUB_STEP_SUMMARY"
          /tmp/prism verify . --base "origin/${{ github.base_ref }}" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
